# ── FAN-CE nginx Reverse Proxy Template ──
# Copy to /etc/nginx/sites-available/fan-ce and edit paths/domain.
# Test:  sudo nginx -t
# Apply: sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;   # ← CHANGE THIS

    # Increase upload size limit for data files
    client_max_body_size 2G;

    # ── Public Portal (built dist) ──
    # Build: cd frontend/admin-web && pnpm -F @fan-ce/web-public build
    location / {
        root /data2/database/fan-ce/frontend/admin-web/apps/web-public/dist;   # ← CHANGE THIS
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Admin Panel (built dist) ──
    # Build: cd frontend/admin-web && pnpm -F @fan-ce/admin-web-antd build
    location /admin {
        alias /data2/database/fan-ce/frontend/admin-web/apps/web-antd/dist;   # ← CHANGE THIS
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # ── Backend API (proxy to uvicorn) ──
    location /api/ {
        proxy_pass http://127.0.0.1:8002;            # FAN-CE backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support (AI chat)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── API Docs ──
    location /docs {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
    }
}
