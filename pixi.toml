[workspace]
authors = ["kentnf, llq, kasper1995 <kentnf@gmail.com>"]
channels = [
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge",
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/bioconda",
]
name = "fan-ce"
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[tasks]
backend = "uv run --directory backend/api-server uvicorn main:app --host 127.0.0.1 --port 8002 --reload"
db-migrate = "uv run --directory backend/api-server alembic upgrade head"
install-plugins = "uv run --directory backend/api-server pip install plugin/*.whl --no-deps"
check-tools = "bash scripts/dev/check-bio-tools.sh"

[dependencies]
# ── Bioinformatics tools (bioconda/conda-forge) ──
samtools = "*"
bcftools = "*"
htslib = "*"
bedtools = "*"
blast = ">=2.16"
primer3 = "*"
mafft = ">=7"
fasttree = "*"
muscle = ">=5"

# ── Python interpreter + uv (conda-forge) ──
python = ">=3.10,<3.14"
uv = ">=0.8"
