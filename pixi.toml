[workspace]
authors = ["kentnf, llq, kasper1995 <kentnf@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "fan-ce"
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]
version = "0.1.0"

[tasks]
backend-dev = "scripts/dev/start-backend-inner.sh"
bio-tools = "scripts/dev/check-bio-tools-inner.sh"

[dependencies]
# ── Bioinformatics tools ──
samtools = "*"
bcftools = "*"
htslib = "*"
bedtools = "*"
blast = ">=2.16"
primer3 = "*"
mafft = ">=7"
fasttree = "*"
muscle = ">=5"

# ── Python runtime ──
python = ">=3.11,<3.13"
pip = "*"
uvicorn = "*"
fastapi = "*"
sqlalchemy = ">=2.0"
psycopg2-binary = "*"
pyyaml = "*"
pydantic = ">=2.0"
pydantic-settings = "*"
python-jose = "*"
passlib = "*"
python-multipart = "*"
aiofiles = "*"
matplotlib = "*"
openpyxl = "*"
goatools = "*"
